theme = "transparent"
[editor]
line-number = "relative"
[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.indent-guides]
render = true

[keys.normal.space]
e = "file_explorer_in_current_buffer_directory"
# Copy current buffer path to clipboard
c = ":sh wl-copy -- \"%{buffer_name}\""
# Copy path:line or path:start-end for the primary selection
C = ":sh if [ %{selection_line_start} -eq %{selection_line_end} ]; then wl-copy -- \"%{buffer_name}:%{selection_line_start}\"; else wl-copy -- \"%{buffer_name}:%{selection_line_start}-%{selection_line_end}\"; fi"

# Same copy bindings in select mode (when highlighting with v)
[keys.select.space]
c = ":sh wl-copy -- \"%{buffer_name}\""
C = ":sh if [ %{selection_line_start} -eq %{selection_line_end} ]; then wl-copy -- \"%{buffer_name}:%{selection_line_start}\"; else wl-copy -- \"%{buffer_name}:%{selection_line_start}-%{selection_line_end}\"; fi"

# Gitui + merge helpers (GIT_EDITOR opens files back in this Helix via zellij)
# %sh is synchronous so :reload! runs after checkout finishes (:sh would race)
[keys.normal.space.g]
c = "changed_file_picker"
g = ":sh zellij run -c -f -x 10%% -y 10%% --width 80%% --height 80%% -- env GIT_EDITOR=$HOME/.config/helix/gitui-editor.sh gitui"
# Accept merge conflict for current buffer, stage, then force-reload
o = [":noop %sh{git checkout --ours -- \"%{buffer_name}\" && git add -- \"%{buffer_name}\"}", ":reload"]
t = [":noop %sh{git checkout --theirs -- \"%{buffer_name}\" && git add -- \"%{buffer_name}\"}", ":reload"]

[keys.insert]
C-space = "completion"
